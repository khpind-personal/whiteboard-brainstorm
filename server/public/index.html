<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whiteboard Brainstorm</title>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #fff; }
    .ping-btn {
      position: fixed; right: 16px; bottom: 16px; z-index: 10;
      background: #FFEB9C; color: #1e1e1e; border: 1.5px solid #1e1e1e;
      border-radius: 6px; padding: 10px 16px; font: 600 14px/1 system-ui;
      cursor: pointer;
    }
    .ping-btn:hover { filter: brightness(0.96); }
    .picker-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .picker-modal {
      background: #fff; padding: 24px; border-radius: 8px;
      max-width: 520px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .picker-modal h2 { margin: 0 0 16px; font: 600 20px/1 system-ui; }
    .picker-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    .picker-card {
      background: #FFEB9C; color: #1e1e1e; border: 1.5px solid #1e1e1e;
      border-radius: 6px; padding: 16px; font: 500 14px/1.3 system-ui;
      cursor: pointer; text-align: left;
    }
    .picker-card:hover { filter: brightness(0.96); }
  </style>
</head>
<body>
  <div id="root"></div>
  <button id="ping" class="ping-btn">@ping</button>
  <script src="vendor/react.development.js"></script>
  <script src="vendor/react-dom.development.js"></script>
  <script src="vendor/excalidraw.development.js"></script>
  <script src="app.js"></script>
</body>
</html>
